<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jegger City - Test Audio Forcé</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 60px; background: #1a1a1a; color: white; }
        h1 { color: #00a2ff; }
        .box { background: #2a2a2a; padding: 30px; display: inline-block; border-radius: 10px; min-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 12px; font-size: 16px; border-radius: 5px; border: none; width: 250px; text-align: center; margin-bottom: 20px; }
        button { padding: 12px 25px; font-size: 16px; background: #00a2ff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .barre-conteneur { width: 250px; height: 15px; background: #444; border-radius: 10px; margin: 0 auto 20px auto; overflow: hidden; }
        #barre-volume { width: 0%; height: 100%; background: #00ff64; transition: width 0.05s ease; }
        .btn-test { background: #ff4141; margin-bottom: 20px; display: block; width: 100%; box-sizing: border-radius; }
    </style>
</head>
<body>

    <h1>Jegger City - Test Audio</h1>
    
    <div class="box">
        <button class="btn-test" onclick="forcerSonNavigateur()">🔊 CLIQUER ICI POUR FORCER LE SON (TEST)</button>
        <hr style="border: 1px solid #444; margin-bottom: 20px;">

        <div id="formulaire">
            <input type="text" id="uid" placeholder="Entre ton ID Roblox"><br>
            <button onclick="lancerRadio()">Lancer la Connexion</button>
        </div>
        
        <div id="statut-container" style="display: none;">
            <p id="statut" style="color: #00ff64; font-size: 18px; font-weight: bold;">🔴 Connecté au flux serveur</p>
            <div class="barre-conteneur">
                <div id="barre-volume"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ transport: ['websocket'] });
        let audioContext = null;
        let monStream = null;
        let processor = null;
        let oscillateurTest = null;

        // Fonction temporaire pour forcer le haut-parleur et l'icône de l'onglet
        function forcerSonNavigateur() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            // Si un test tourne déjà, on l'arrête au deuxième clic
            if (oscillateurTest) {
                oscillateurTest.stop();
                oscillateurTest = null;
                alert("Test audio arrêté !");
                return;
            }

            // On crée un bip sonore strident (440Hz) audible pour être SÛR que le son sort
            oscillateurTest = audioContext.createOscillator();
            const gainTest = audioContext.createGain();
            
            oscillateurTest.type = 'sine';
            oscillateurTest.frequency.setValueAtTime(440, audioContext.currentTime); // Note LA
            gainTest.gain.setValueAtTime(0.1, audioContext.currentTime); // Volume modéré pour tes oreilles
            
            oscillateurTest.connect(gainTest);
            gainTest.connect(audioContext.destination);
            
            oscillateurTest.start();
            alert("Le bip sonore doit tourner. L'icône haut-parleur DOIT apparaître sur ton onglet maintenant !");
        }

        async function lancerRadio() {
            const id = document.getElementById('uid').value.trim();
            if(!id) return alert("Met un ID");

            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                monStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                socket.emit('join-voice', id);
                
                document.getElementById('formulaire').style.display = 'none';
                document.getElementById('statut-container').style.display = 'block';

                const source = audioContext.createMediaStreamSource(monStream);
                
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = function(e) {
                    const inputData = e.inputBuffer.getChannelData(0);
                    socket.emit('flux-audio-brut', inputData.buffer);
                };

                const analyser = audioContext.createAnalyser();
                source.connect(analyser);
                analyser.fftSize = 32;
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                function draw() {
                    if(!monStream) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                    document.getElementById('barre-volume').style.width = Math.min(100, (sum/dataArray.length)*4) + "%";
                    requestAnimationFrame(draw);
                }
                draw();

            } catch (err) {
                alert("Accepte le micro !");
            }
        }

        socket.on('stream-audio-serveur', (data) => {
            if (!audioContext) return;

            const audioBuffer = audioContext.createBuffer(1, data.buffer.byteLength / 4, audioContext.sampleRate);
            audioBuffer.getChannelData(0).set(new Float32Array(data.buffer));

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);
            source.start();
        });
    </script>
</body>
</html>
