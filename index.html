<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Vocal</title>
    <style>
        body { font-family: sans-serif; background: #0b1120; color: white; margin: 0; padding: 20px; display: flex; gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; }
        .sidebar { width: 300px; }
        .main { flex-grow: 1; }
        button { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>

<div class="card sidebar">
    <h3>Connexion</h3>
    <button style="background: #22c55e;" onclick="alert('Lien OAuth Roblox ici')">Se connecter avec Roblox</button>
    <button style="background: #3b82f6;" id="btn-vocal" onclick="lancerAudio()">Se connecter au vocal</button>
</div>

<div class="card main">
    <h3>Joueurs connectés</h3>
    <table>
        <thead><tr><th>Joueur</th><th>Status</th></tr></thead>
        <tbody id="player-body"></tbody>
    </table>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    function lancerAudio() {
        const id = prompt("Entre ton ID");
        socket.emit('join-voice', id);
    }

    socket.on('update-list', (joueurs) => {
        const body = document.getElementById('player-body');
        body.innerHTML = '';
        for(let id in joueurs) {
            if(joueurs[id].vocalActive) {
                body.innerHTML += `<tr><td>${joueurs[id].username}</td><td>${joueurs[id].isMuted ? 'Mute' : 'Actif'}</td></tr>`;
            }
        }
    });
</script>
</body>
</html>
